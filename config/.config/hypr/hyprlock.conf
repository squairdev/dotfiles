source = /home/$USER/.cache/wal/colors-hyprland.conf

background {
    monitor =
    path = $wallpaper
    blur_size = 5
    blur_passes = 3
}

general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = false
    grace = 0
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = $color6
    fade_on_empty = false
    rounding = 16
    check_color = $color6
    placeholder_text = <i>passwd...</i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = $color6
  font_size = 22
  font_family = NotoSansMono Bold
  position = 0, 200
  halign = center
  valign = center
}

label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%-I:%M")"
  color = $color6
  font_size = 95
  font_family = NotoSansMono
  position = 0, 100
  halign = center
  valign = center
}


shape {
    monitor =
    size = 400, 210
    color = rgba(0, 0, 0, 0.2)
    rounding = 16
    position = 0, 130
    halign = center
    valign = center
    zindex = -1
}
label {
    monitor =
    text = cmd[update:10] echo "$(tail -n 1 /tmp/cava_out)"
    color = $color12
    font_size = 20
    valign = bottom
    position = 0, -4
}
